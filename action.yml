name: "Build GitHub Action: NEAR Testnet Deploy"
description: "## Overview Create a GitHub Action specifically for deploying to NEAR testnet with automatic faucet funding and test exe"

inputs:
  contract_path:
    description: "Path to the NEAR contract directory or WASM file to deploy"
    required: true
    default: ''
  testnet_account_id:
    description: "NEAR testnet account ID for deployment (will be created if it doesn't exist)"
    required: true
    default: ''
  near_private_key:
    description: "Private key for testnet account (stored as GitHub secret)"
    required: true
    default: ''
  faucet_funding_amount:
    description: "Amount of NEAR tokens to request from faucet in testnet"
    required: false
    default: '10'
  test_script_path:
    description: "Path to test script or command to run after deployment"
    required: false
    default: 'npm test'
  skip_faucet_request:
    description: "Skip automatic faucet funding if account already has sufficient balance"
    required: false
    default: 'false'

outputs:
  result:
    description: "Action execution result"
  status:
    description: "Pass or fail status"

runs:
  using: composite
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
    - name: Install dependencies
      shell: bash
      run: cd ${{ github.action_path }} && npm install --production
    - name: Run action
      shell: bash
      id: run
      run: cd ${{ github.action_path }} && node src/index.js
      env:
        INPUT_CONTRACT_PATH: ${{ inputs.contract_path }}
        INPUT_TESTNET_ACCOUNT_ID: ${{ inputs.testnet_account_id }}
        INPUT_NEAR_PRIVATE_KEY: ${{ inputs.near_private_key }}
        INPUT_FAUCET_FUNDING_AMOUNT: ${{ inputs.faucet_funding_amount }}
        INPUT_TEST_SCRIPT_PATH: ${{ inputs.test_script_path }}
        INPUT_SKIP_FAUCET_REQUEST: ${{ inputs.skip_faucet_request }}