name: "Build GitHub Action: NEAR Testnet Deploy"
description: "## Overview Create a GitHub Action specifically for deploying to NEAR testnet with automatic faucet funding and test exe"

inputs:
  contract_path:
    description: "Path to the contract file or directory to deploy"
    required: true
    default: ''
  testnet_account_id:
    description: "NEAR testnet account ID for deployment"
    required: true
    default: ''
  near_credentials:
    description: "Base64-encoded NEAR credentials/private key for testnet signing"
    required: true
    default: ''
  faucet_enabled:
    description: "Enable automatic faucet funding for testnet account"
    required: false
    default: 'true'
  test_command:
    description: "Command to run smoke tests after deployment"
    required: false
    default: 'npm test'
  network:
    description: "NEAR network to deploy to (testnet)"
    required: false
    default: 'testnet'

outputs:
  result:
    description: "Action execution result"
  status:
    description: "Pass or fail status"

runs:
  using: composite
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
    - name: Install dependencies
      shell: bash
      run: cd ${{ github.action_path }} && npm install --production
    - name: Run action
      shell: bash
      id: run
      run: cd ${{ github.action_path }} && node src/index.js
      env:
        INPUT_CONTRACT_PATH: ${{ inputs.contract_path }}
        INPUT_TESTNET_ACCOUNT_ID: ${{ inputs.testnet_account_id }}
        INPUT_NEAR_CREDENTIALS: ${{ inputs.near_credentials }}
        INPUT_FAUCET_ENABLED: ${{ inputs.faucet_enabled }}
        INPUT_TEST_COMMAND: ${{ inputs.test_command }}
        INPUT_NETWORK: ${{ inputs.network }}