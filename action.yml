name: "Build GitHub Action: NEAR Testnet Deploy"
description: "## Overview Create a GitHub Action specifically for deploying to NEAR testnet with automatic faucet funding and test exe"

inputs:
  contract_path:
    description: "Path to the contract directory or WASM binary file to deploy"
    required: true
    default: ''
  testnet_account_id:
    description: "NEAR testnet account ID for deployment (will be created if it doesn't exist)"
    required: true
    default: ''
  near_private_key:
    description: "Private key for NEAR testnet account authentication"
    required: true
    default: ''
  faucet_amount:
    description: "Amount of NEAR tokens to request from faucet (in NEAR)"
    required: false
    default: '200'
  test_script_path:
    description: "Path to test script or command to run smoke tests after deployment"
    required: false
    default: 'npm test'
  report_results:
    description: "Whether to generate and upload test results report"
    required: false
    default: 'true'

outputs:
  result:
    description: "Action execution result"
  status:
    description: "Pass or fail status"

runs:
  using: composite
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
    - name: Install dependencies
      shell: bash
      run: cd ${{ github.action_path }} && npm install --production
    - name: Run action
      shell: bash
      id: run
      run: cd ${{ github.action_path }} && node src/index.js
      env:
        INPUT_CONTRACT_PATH: ${{ inputs.contract_path }}
        INPUT_TESTNET_ACCOUNT_ID: ${{ inputs.testnet_account_id }}
        INPUT_NEAR_PRIVATE_KEY: ${{ inputs.near_private_key }}
        INPUT_FAUCET_AMOUNT: ${{ inputs.faucet_amount }}
        INPUT_TEST_SCRIPT_PATH: ${{ inputs.test_script_path }}
        INPUT_REPORT_RESULTS: ${{ inputs.report_results }}