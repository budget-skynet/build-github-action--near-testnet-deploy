name: "Build GitHub Action: NEAR Testnet Deploy"
description: "## Overview Create a GitHub Action specifically for deploying to NEAR testnet with automatic faucet funding and test exe"

inputs:
  contract_path:
    description: "Path to the NEAR contract directory or compiled WASM file"
    required: true
    default: ''
  testnet_account_id:
    description: "NEAR testnet account ID for deployment"
    required: true
    default: ''
  near_cli_version:
    description: "Version of NEAR CLI to use"
    required: false
    default: 'latest'
  faucet_amount:
    description: "Amount of NEAR tokens to request from faucet (in NEAR)"
    required: false
    default: '10'
  run_tests:
    description: "Enable execution of smoke tests after deployment"
    required: false
    default: 'true'
  test_command:
    description: "Custom command to run for smoke tests"
    required: false
    default: 'npm test'

outputs:
  result:
    description: "Action execution result"
  status:
    description: "Pass or fail status"

runs:
  using: composite
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
    - name: Install dependencies
      shell: bash
      run: cd ${{ github.action_path }} && npm install --production
    - name: Run action
      shell: bash
      id: run
      run: cd ${{ github.action_path }} && node src/index.js
      env:
        INPUT_CONTRACT_PATH: ${{ inputs.contract_path }}
        INPUT_TESTNET_ACCOUNT_ID: ${{ inputs.testnet_account_id }}
        INPUT_NEAR_CLI_VERSION: ${{ inputs.near_cli_version }}
        INPUT_FAUCET_AMOUNT: ${{ inputs.faucet_amount }}
        INPUT_RUN_TESTS: ${{ inputs.run_tests }}
        INPUT_TEST_COMMAND: ${{ inputs.test_command }}