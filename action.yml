name: "Build GitHub Action: NEAR Testnet Deploy"
description: "## Overview Create a GitHub Action specifically for deploying to NEAR testnet with automatic faucet funding and test exe"

inputs:
  contract_path:
    description: "Path to the contract directory or compiled WASM file to deploy"
    required: true
    default: ''
  testnet_account_id:
    description: "NEAR testnet account ID for deployment (will be created if needed)"
    required: true
    default: ''
  testnet_private_key:
    description: "Private key for testnet account authentication"
    required: true
    default: ''
  faucet_amount:
    description: "Amount of NEAR tokens to request from faucet (in NEAR)"
    required: false
    default: '100'
  test_command:
    description: "Command to execute for smoke tests after deployment"
    required: false
    default: 'npm test'
  near_cli_version:
    description: "Version of NEAR CLI to use for deployment"
    required: false
    default: 'latest'

outputs:
  result:
    description: "Action execution result"
  status:
    description: "Pass or fail status"

runs:
  using: composite
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
    - name: Install dependencies
      shell: bash
      run: cd ${{ github.action_path }} && npm install --production
    - name: Run action
      shell: bash
      id: run
      run: cd ${{ github.action_path }} && node src/index.js
      env:
        INPUT_CONTRACT_PATH: ${{ inputs.contract_path }}
        INPUT_TESTNET_ACCOUNT_ID: ${{ inputs.testnet_account_id }}
        INPUT_TESTNET_PRIVATE_KEY: ${{ inputs.testnet_private_key }}
        INPUT_FAUCET_AMOUNT: ${{ inputs.faucet_amount }}
        INPUT_TEST_COMMAND: ${{ inputs.test_command }}
        INPUT_NEAR_CLI_VERSION: ${{ inputs.near_cli_version }}