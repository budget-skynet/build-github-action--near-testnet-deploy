name: "Build GitHub Action: NEAR Testnet Deploy"
description: "## Overview Create a GitHub Action specifically for deploying to NEAR testnet with automatic faucet funding and test exe"

inputs:
  near_account_id:
    description: "NEAR testnet account ID for deployment"
    required: true
    default: ''
  contract_path:
    description: "Path to the contract binary or source code to deploy"
    required: true
    default: ''
  private_key:
    description: "Private key for the NEAR testnet account (stored as secret)"
    required: true
    default: ''
  faucet_funding:
    description: "Amount of NEAR tokens to request from faucet (in NEAR)"
    required: false
    default: '10'
  run_tests:
    description: "Whether to execute smoke tests after deployment"
    required: false
    default: 'true'
  test_command:
    description: "Command to run for smoke tests"
    required: false
    default: 'npm test'

outputs:
  result:
    description: "Action execution result"
  status:
    description: "Pass or fail status"

runs:
  using: composite
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
    - name: Install dependencies
      shell: bash
      run: cd ${{ github.action_path }} && npm install --production
    - name: Run action
      shell: bash
      id: run
      run: cd ${{ github.action_path }} && node src/index.js
      env:
        INPUT_NEAR_ACCOUNT_ID: ${{ inputs.near_account_id }}
        INPUT_CONTRACT_PATH: ${{ inputs.contract_path }}
        INPUT_PRIVATE_KEY: ${{ inputs.private_key }}
        INPUT_FAUCET_FUNDING: ${{ inputs.faucet_funding }}
        INPUT_RUN_TESTS: ${{ inputs.run_tests }}
        INPUT_TEST_COMMAND: ${{ inputs.test_command }}