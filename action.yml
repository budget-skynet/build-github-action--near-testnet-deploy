name: "Build GitHub Action: NEAR Testnet Deploy"
description: "## Overview Create a GitHub Action specifically for deploying to NEAR testnet with automatic faucet funding and test exe"

inputs:
  contract_path:
    description: "Path to the NEAR contract directory or compiled WASM file"
    required: true
    default: ''
  testnet_account_id:
    description: "NEAR testnet account ID for deployment"
    required: true
    default: ''
  testnet_private_key:
    description: "Private key for testnet account authentication"
    required: true
    default: ''
  faucet_amount:
    description: "Amount of NEAR tokens to request from faucet in tokens"
    required: false
    default: '10'
  test_command:
    description: "Command to run smoke tests after deployment"
    required: false
    default: 'npm test'
  auto_create_account:
    description: "Automatically create testnet account if it doesn't exist"
    required: false
    default: 'true'

outputs:
  result:
    description: "Action execution result"
  status:
    description: "Pass or fail status"

runs:
  using: composite
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
    - name: Install dependencies
      shell: bash
      run: cd ${{ github.action_path }} && npm install --production
    - name: Run action
      shell: bash
      id: run
      run: cd ${{ github.action_path }} && node src/index.js
      env:
        INPUT_CONTRACT_PATH: ${{ inputs.contract_path }}
        INPUT_TESTNET_ACCOUNT_ID: ${{ inputs.testnet_account_id }}
        INPUT_TESTNET_PRIVATE_KEY: ${{ inputs.testnet_private_key }}
        INPUT_FAUCET_AMOUNT: ${{ inputs.faucet_amount }}
        INPUT_TEST_COMMAND: ${{ inputs.test_command }}
        INPUT_AUTO_CREATE_ACCOUNT: ${{ inputs.auto_create_account }}