name: "Build GitHub Action: NEAR Testnet Deploy"
description: "## Overview Create a GitHub Action specifically for deploying to NEAR testnet with automatic faucet funding and test exe"

inputs:
  contract_path:
    description: "Path to the contract file or directory to deploy"
    required: true
    default: ''
  account_id:
    description: "NEAR testnet account ID for deployment"
    required: true
    default: ''
  private_key:
    description: "Private key for testnet account authentication"
    required: true
    default: ''
  faucet_url:
    description: "NEAR testnet faucet URL for funding"
    required: false
    default: 'https://helper.testnet.near.org/account'
  test_command:
    description: "Command to run smoke tests after deployment"
    required: false
    default: 'npm test'
  network:
    description: "NEAR network to deploy to"
    required: false
    default: 'testnet'

outputs:
  result:
    description: "Action execution result"
  status:
    description: "Pass or fail status"

runs:
  using: composite
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
    - name: Install dependencies
      shell: bash
      run: cd ${{ github.action_path }} && npm install --production
    - name: Run action
      shell: bash
      id: run
      run: cd ${{ github.action_path }} && node src/index.js
      env:
        INPUT_CONTRACT_PATH: ${{ inputs.contract_path }}
        INPUT_ACCOUNT_ID: ${{ inputs.account_id }}
        INPUT_PRIVATE_KEY: ${{ inputs.private_key }}
        INPUT_FAUCET_URL: ${{ inputs.faucet_url }}
        INPUT_TEST_COMMAND: ${{ inputs.test_command }}
        INPUT_NETWORK: ${{ inputs.network }}