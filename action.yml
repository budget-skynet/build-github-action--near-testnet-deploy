name: "Build GitHub Action: NEAR Testnet Deploy"
description: "## Overview Create a GitHub Action specifically for deploying to NEAR testnet with automatic faucet funding and test exe"

inputs:
  contract_path:
    description: "Path to the contract source code or compiled WASM file"
    required: true
    default: ''
  testnet_account_id:
    description: "NEAR testnet account ID for deployment"
    required: true
    default: ''
  near_private_key:
    description: "Private key for testnet account authentication"
    required: true
    default: ''
  faucet_enabled:
    description: "Enable automatic faucet funding for testnet account"
    required: false
    default: 'true'
  smoke_tests_enabled:
    description: "Run basic smoke tests after contract deployment"
    required: false
    default: 'true'
  test_script_path:
    description: "Path to custom test script to execute post-deployment"
    required: false
    default: ''

outputs:
  result:
    description: "Action execution result"
  status:
    description: "Pass or fail status"

runs:
  using: composite
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
    - name: Install dependencies
      shell: bash
      run: cd ${{ github.action_path }} && npm install --production
    - name: Run action
      shell: bash
      id: run
      run: cd ${{ github.action_path }} && node src/index.js
      env:
        INPUT_CONTRACT_PATH: ${{ inputs.contract_path }}
        INPUT_TESTNET_ACCOUNT_ID: ${{ inputs.testnet_account_id }}
        INPUT_NEAR_PRIVATE_KEY: ${{ inputs.near_private_key }}
        INPUT_FAUCET_ENABLED: ${{ inputs.faucet_enabled }}
        INPUT_SMOKE_TESTS_ENABLED: ${{ inputs.smoke_tests_enabled }}
        INPUT_TEST_SCRIPT_PATH: ${{ inputs.test_script_path }}