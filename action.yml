name: "Build GitHub Action: NEAR Testnet Deploy"
description: "## Overview Create a GitHub Action specifically for deploying to NEAR testnet with automatic faucet funding and test exe"

inputs:
  contract_path:
    description: "Path to the NEAR contract directory or compiled WASM file"
    required: true
    default: ''
  testnet_account_id:
    description: "NEAR testnet account ID for deployment"
    required: true
    default: ''
  testnet_private_key:
    description: "Private key for testnet account authentication (use GitHub secrets)"
    required: true
    default: ''
  faucet_enabled:
    description: "Enable automatic testnet faucet funding"
    required: false
    default: 'true'
  smoke_tests_path:
    description: "Path to smoke test file or directory to execute after deployment"
    required: false
    default: 'tests/'
  report_results:
    description: "Enable detailed test results reporting and GitHub annotations"
    required: false
    default: 'true'

outputs:
  result:
    description: "Action execution result"
  status:
    description: "Pass or fail status"

runs:
  using: composite
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
    - name: Install dependencies
      shell: bash
      run: cd ${{ github.action_path }} && npm install --production
    - name: Run action
      shell: bash
      id: run
      run: cd ${{ github.action_path }} && node src/index.js
      env:
        INPUT_CONTRACT_PATH: ${{ inputs.contract_path }}
        INPUT_TESTNET_ACCOUNT_ID: ${{ inputs.testnet_account_id }}
        INPUT_TESTNET_PRIVATE_KEY: ${{ inputs.testnet_private_key }}
        INPUT_FAUCET_ENABLED: ${{ inputs.faucet_enabled }}
        INPUT_SMOKE_TESTS_PATH: ${{ inputs.smoke_tests_path }}
        INPUT_REPORT_RESULTS: ${{ inputs.report_results }}